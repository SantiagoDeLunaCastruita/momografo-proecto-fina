{% extends "base.html" %}

{% block title %}Cambiar contraseña | Momografo{% endblock %}

{% block content %}
<div class="card shadow-lg p-4 bg-dark rounded-0 border border-danger mx-auto" style="max-width: 28rem; border-top: 5px solid #ff0000;">
    <div class="card-body">
        <div class="text-center mb-4">
            <div class="fs-1">🔑</div>
            <h2 class="fw-bold text-light">Cambiar <span class="text-danger">Contraseña</span></h2>
            <p class="text-white-50">Cuenta: <strong>{{ email }}</strong></p>
        </div>

        {% if error %}
            <div class="alert alert-danger rounded-0" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <form method="post">
            <div class="mb-3">
                <label class="form-label small text-light text-uppercase fw-bold" for="password">Nueva contraseña</label>
                <input type="password" name="password" id="password" class="form-control bg-light text-dark border-secondary rounded-0" required>
            </div>
            <div class="mb-3">
                <label class="form-label small text-light text-uppercase fw-bold" for="confirm">Confirmar contraseña</label>
                <input type="password" name="confirm" id="confirm" class="form-control bg-light text-dark border-secondary rounded-0" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mt-3 text-white rounded-0">Confirmar cambios</button>
        </form>

        <hr class="border-secondary mt-4">

        <div class="text-center mt-3">
            <a href="/" class="btn btn-outline-light w-100 fw-bold py-2 text-white text-uppercase rounded-0">Volver al inicio</a>
        </div>
    </div>
</div>
{% endblock %}
