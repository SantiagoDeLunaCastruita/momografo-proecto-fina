<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Red Black App{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .navbar { border-bottom: 2px solid #ff0000; background-color: #000; }
        .text-red { color: #ff0000; }
        .bg-red { background-color: #ff0000; border: none; }
        .bg-red:hover { background-color: #cc0000; }
        /* Estilo para los bloques de contenido */
        .main-container { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <span class="text-red">MOMO</span>GRAFO
            </a>
            <div class="ms-auto">
                {% if session.usuario_id %}
                    <a href="/salir" class="btn btn-outline-light btn-sm">SALIR</a>
                {% else %}
                    <a href="/registro" class="btn btn-outline-danger btn-sm">REGISTRO</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="main-container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
