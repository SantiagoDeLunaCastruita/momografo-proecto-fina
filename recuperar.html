{% extends "base.html" %}

{% block title %}Recuperar contraseña | Momografo{% endblock %}

{% block content %}
<div class="card shadow-lg p-4 bg-dark rounded-0 border border-danger mx-auto" style="width: 24rem; border-top: 5px solid #ff0000;">
    <div class="card-body">
        <div class="text-center mb-4">
             <div class="fs-1">🔒</div>
             <h2 class="fw-bold text-light">Recuperar <span class="text-danger">Contraseña</span></h2>
             <p class="text-white-50">Ingresa tu correo y te enviaremos instrucciones para restablecer tu contraseña.</p>
        </div>

        <form action="/recuperar" method="POST">
            <div class="mb-3">
                <label class="form-label small text-light text-uppercase fw-bold">Correo electrónico</label>
                <input type="email" name="email" class="form-control bg-light text-dark border-secondary rounded-0" placeholder="tu@email.com" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mt-3 text-white rounded-0">Enviar instrucciones</button>
        </form>

        <hr class="border-secondary mt-4">

        <div class="text-center mt-3">
            <p class="text-white-50 small mb-3">¿Recordaste tu contraseña?</p>
            <a href="/login" class="btn btn-outline-danger w-100 fw-bold py-2 text-white text-uppercase rounded-0">Volver a iniciar sesión</a>
        </div>
    </div>
</div>
{% endblock %}
